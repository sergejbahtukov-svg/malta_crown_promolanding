name: Deploy to Yandex Cloud

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          tmp_dir="$(mktemp -d)"
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "$tmp_dir/awscliv2.zip"
          unzip -q "$tmp_dir/awscliv2.zip" -d "$tmp_dir"
          sudo "$tmp_dir/aws/install" --update

      - name: Sync to Yandex Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-central1
          AWS_ENDPOINT_URL: https://storage.yandexcloud.net
        run: |
          aws s3 sync . s3://${{ secrets.YC_BUCKET_NAME }} \
            --endpoint-url=https://storage.yandexcloud.net \
            --acl public-read \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --delete

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$RUNNER_TEMP/yandex-cloud" -n
          echo "$RUNNER_TEMP/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud CLI
        env:
          YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
          YC_TOKEN: ${{ secrets.YC_TOKEN }}
        run: |
          if [ -n "$YC_SERVICE_ACCOUNT_KEY_JSON" ]; then
            key_file="$RUNNER_TEMP/yc-key.json"
            printf '%s' "$YC_SERVICE_ACCOUNT_KEY_JSON" > "$key_file"
            yc config set service-account-key "$key_file"
          elif [ -n "$YC_TOKEN" ]; then
            yc config set token "$YC_TOKEN"
          else
            echo "::error::Add YC_SERVICE_ACCOUNT_KEY_JSON or YC_TOKEN repository secret to deploy the serverless function."
            exit 1
          fi

      - name: Deploy Yandex Cloud Function
        run: |
          yc serverless function version create \
            --function-id=d4ererc6uunkql07t59d \
            --runtime=python312 \
            --entrypoint=index.handler \
            --memory=128m \
            --execution-timeout=30s \
            --source-path=. \
            --service-account-id=aje71eak9mopoffe6kar \
            --environment=SMTP_HOST=smtp.yandex.ru,SMTP_PORT=465,SMTP_TO_EMAIL=mskoffice@maltacrown.ru \
            --secret=id=e6qj62vjpmqtniokmnrt,key=smtp_username,environment-variable=SMTP_USERNAME \
            --secret=id=e6qj62vjpmqtniokmnrt,key=smtp_password,environment-variable=SMTP_PASSWORD
