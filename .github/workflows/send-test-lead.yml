name: Send one-off test lead

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/send-test-lead.yml

permissions:
  contents: read
  id-token: write

jobs:
  send-test-lead:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$RUNNER_TEMP/yandex-cloud" -n
          echo "$RUNNER_TEMP/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Get Yandex Cloud IAM token
        id: get-iam-token
        uses: docker://ghcr.io/yc-actions/yc-iam-token-fed:1.0.0
        with:
          yc-sa-id: ajet2vjo0tsv19opo4ci

      - name: Send test lead to sbahtyukov
        env:
          YC_IAM_TOKEN: ${{ steps.get-iam-token.outputs.token }}
        run: |
          set -euo pipefail

          function_name="form-mail-sender-test-${GITHUB_RUN_ID}"
          function_source="$RUNNER_TEMP/function-source"
          mkdir -p "$function_source"
          cp index.py "$function_source/index.py"

          cleanup() {
            yc serverless function delete --name "$function_name" --folder-id=b1g6jtqikcmuiou879sl >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          yc serverless function create --name "$function_name" --folder-id=b1g6jtqikcmuiou879sl

          yc serverless function version create \
            --function-name="$function_name" \
            --folder-id=b1g6jtqikcmuiou879sl \
            --runtime=python312 \
            --entrypoint=index.handler \
            --memory=128MB \
            --execution-timeout=30s \
            --source-path="$function_source" \
            --service-account-id=ajet2vjo0tsv19opo4ci \
            --environment=SMTP_HOST=smtp.yandex.ru,SMTP_PORT=465,SMTP_TO_EMAIL=sbahtyukov@ya.ru \
            --secret=id=e6qj62vjpmqtniokmnrt,key=smtp_username,environment-variable=SMTP_USERNAME \
            --secret=id=e6qj62vjpmqtniokmnrt,key=smtp_password,environment-variable=SMTP_PASSWORD

          suffix="$(date +%s)"
          cat > "$RUNNER_TEMP/test-event.json" <<JSON
          {
            "httpMethod": "POST",
            "body": "{\"name\":\"Тестовый родитель ${suffix}\",\"phone\":\"+7 999 123-45-67\",\"email\":\"test-${suffix}@example.com\",\"age\":\"10 лет\",\"message\":\"Тестовая заявка из GitHub Actions. Можно игнорировать.\",\"folder\":\"заявка мальта краун\",\"consent\":\"on\",\"page\":\"GitHub Actions one-off test\"}"
          }
          JSON

          response="$(yc --format json serverless function invoke --name "$function_name" --folder-id=b1g6jtqikcmuiou879sl --data-file "$RUNNER_TEMP/test-event.json")"
          echo "$response"

          RESPONSE="$response" python - <<'PY'
          import json
          import os
          import sys

          data = json.loads(os.environ["RESPONSE"])
          status = data.get("statusCode")
          body = data.get("body", "")

          try:
              body_json = json.loads(body) if isinstance(body, str) else body
          except json.JSONDecodeError:
              body_json = {}

          if status != 200 or body_json.get("status") != "success":
              print(f"Unexpected function response: statusCode={status}, body={body}", file=sys.stderr)
              sys.exit(1)

          print("Test lead sent successfully to sbahtyukov@ya.ru")
          PY
